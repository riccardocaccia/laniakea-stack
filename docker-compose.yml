services:
  # --- DATABASE LAYER ---
  postgres:
    image: postgres:15-alpine
    container_name: laniakea_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - laniakea_network

  # --- REDIS ---
  redis:
    image: redis:7-alpine
    container_name: laniakea_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - laniakea_network

  # --- SECRET MANAGEMENT VAULT ---
  vault:
    image: hashicorp/vault:1.15
    container_name: laniakea_vault
    restart: unless-stopped
    capabilities:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}}, "listener": {"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}, "ui": true}'
    volumes:
      - ./vault/data:/vault/file
    command: server
    networks:
      - laniakea_network

  # --- KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.2
    container_name: laniakea_keycloak
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${DOMAIN_NAME}
      KC_PROXY: edge
      KC_HOSTNAME_STRICT_HTTPS: "true"
    depends_on:
      - postgres
    networks:
      - laniakea_network

  # --- REVERSE PROXY LAYER ---
  caddy:
    image: caddy:2-alpine
    container_name: laniakea_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - keycloak
      - vault
    networks:
      - laniakea_network

networks:
  laniakea_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
